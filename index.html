<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mallorca Urbex - 420Doma</title>
    
    <link rel="icon" type="image/png" href="logo.png">

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a152e">
    <link rel="apple-touch-icon" href="icona-192.png">

    <style>
        /* Rimuove i margini predefiniti del browser */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* Evita barre di scorrimento doppie */
            /* Sfondo armonizzato con la barra superiore dell'app */
            background-color: #1a152e; 
        }

        /* Rende l'iframe a schermo intero */
        .fullscreen-iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <iframe 
        src="https://www.google.com/maps/d/u/7/embed?mid=1L3s5ImJYxnWoiF0IiUqBAlVby_Z51Uw&ehbc=2E312F" 
        class="fullscreen-iframe"
        allowfullscreen>
    </iframe>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker registrato!', reg))
                    .catch(err => console.log('Errore SW:', err));
            });
        }
    </script>

</body>
</html>
