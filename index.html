<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mallorca Urbex - 420Doma</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2f3130">
    <link rel="apple-touch-icon" href="icona-192.png">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; 
            background-color: #2f3130; 
        }

        .fullscreen-iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <iframe 
        src="https://www.google.com/maps/d/u/7/embed?mid=1L3s5ImJYxnWoiF0IiUqBAlVby_Z51Uw&ehbc=2E312F" 
        class="fullscreen-iframe"
        allowfullscreen>
    </iframe>

    <script>
        // 1. Registrazione del Service Worker (già corretta da te)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker registrato!', reg))
                    .catch(err => console.log('Errore SW:', err));
            });
        }

        // 2. Mantenere lo schermo acceso (Wake Lock API)
        let wakeLock = null;

        const requestWakeLock = async () => {
            if ('wakeLock' in navigator) {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                    console.log('Wake Lock attivato: lo schermo non andrà in stand-by.');
                    
                    wakeLock.addEventListener('release', () => {
                        console.log('Wake Lock rilasciato.');
                    });
                } catch (err) {
                    console.error(`Errore Wake Lock: ${err.name}, ${err.message}`);
                }
            } else {
                console.warn('Wake Lock API non supportata in questo browser.');
            }
        };

        // Richiedi subito il Wake Lock
        requestWakeLock();

        // 3. Gestione chiusura/background: Svuota la cache e gestisci il Wake Lock
        document.addEventListener('visibilitychange', () => {
            // Se l'app torna visibile, riattiva il Wake Lock
            if (wakeLock !== null && document.visibilityState === 'visible') {
                requestWakeLock();
            }

            // Se l'app va in background o viene chiusa, svuota la Cache Storage
            if (document.visibilityState === 'hidden') {
                if ('caches' in window) {
                    caches.keys().then(function(cacheNames) {
                        cacheNames.forEach(function(cacheName) {
                            caches.delete(cacheName);
                            console.log(`Cache ${cacheName} eliminata.`);
                        });
                    });
                }
            }
        });

        // Evento di backup per tentare di pulire la cache alla chiusura esatta della finestra
        window.addEventListener('pagehide', () => {
            if ('caches' in window) {
                caches.keys().then(function(cacheNames) {
                    cacheNames.forEach(function(cacheName) {
                        caches.delete(cacheName);
                    });
                });
            }
        });
    </script>

</body>
</html>
