<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>420Doma Urbex-PMI</title>
    <style>
        /* Rimuove i margini predefiniti del browser */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* Evita barre di scorrimento doppie */
            background-color: #f0f0f0; /* Opzionale: un colore di sfondo neutro */
        }

        /* Rende l'iframe a schermo intero */
        .fullscreen-iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <iframe 
        src="https://www.google.com/maps/d/u/1/embed?mid=1dBfNdxJuzUC60ovXTZLEHV7ldJZBXJg&ehbc=2E312F" 
        class="fullscreen-iframe"
        allowfullscreen>
    </iframe>

</body>
</html>
